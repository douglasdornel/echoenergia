  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-eeds-navy-300: #8290CC;\n  --eeds-navy-400: #4D5FAE;\n  --eeds-navy-500: #2E419A;\n  --eeds-navy-600: #1E2C7A; /* primary brand */\n  --eeds-navy-700: #172362;\n  --eeds-navy-800: #101A47;\n  --eeds-navy-900: #0A1130;\n\n  /* -------- BRAND · ORANGE (action / CTA only) -------- */\n  --eeds-orange-50:  #FFF3EB;\n  --eeds-orange-100: #FFE0CC;\n  --eeds-orange-200: #FDB988;\n  --eeds-orange-300: #FB9655;\n  --eeds-orange-400: #F97316; /* CTA */\n  --eeds-orange-500: #E55F0A; /* CTA hover */\n  --eeds-orange-600: #BD4D08;\n  --eeds-orange-700: #8F3A06;\n\n  /* -------- INK (warm-tinted neutrals — not pure gray) ---- */\n  --eeds-ink-50:  #F8F9FB;\n  --eeds-ink-100: #F1F3F7;\n  --eeds-ink-200: #E4E7EE;\n  --eeds-ink-300: #CBD0DB;\n  --eeds-ink-400: #9098AB;\n  --eeds-ink-500: #646E85;\n  --eeds-ink-600: #454D62;\n  --eeds-ink-700: #2D3445;\n  --eeds-ink-800: #1B202C;\n  --eeds-ink-900: #0E1119;\n\n  /* -------- SEMANTIC -------- */\n  --eeds-success-bg:     #E8F5EE;\n  --eeds-success-fg:     #0F7A3D;\n  --eeds-success-border: #A8D9BD;\n  --eeds-warning-bg:     #FFF6E5;\n  --eeds-warning-fg:     #9A6300;\n  --eeds-warning-border: #F0CB7A;\n  --eeds-danger-bg:      #FEEAE9;\n  --eeds-danger-fg:      #A8201A;\n  --eeds-danger-border:  #F0A39F;\n  --eeds-info-bg:        #E8F0FE;\n  --eeds-info-fg:        #1456C7;\n  --eeds-info-border:    #A8C2EE;\n\n  /* -------- DATA-VIZ (dedicated; never mix with semantic) -- */\n  --eeds-viz-1: #1E2C7A; /* navy */\n  --eeds-viz-2: #F97316; /* orange */\n  --eeds-viz-3: #0EA5A4; /* teal */\n  --eeds-viz-4: #8B5CF6; /* purple */\n  --eeds-viz-5: #E11D48; /* rose */\n  --eeds-viz-6: #475569; /* slate */\n\n  /* -------- SEMANTIC SURFACE / TEXT (recommended app vars) -- */\n  --eeds-bg-base:     var(--eeds-ink-50);\n  --eeds-bg-surface:  #FFFFFF;\n  --eeds-bg-subtle:   var(--eeds-ink-100);\n  --eeds-bg-brand:    var(--eeds-navy-600);\n  --eeds-text-primary:    var(--eeds-ink-900);\n  --eeds-text-secondary:  var(--eeds-ink-600);\n  --eeds-text-muted:      var(--eeds-ink-500);\n  --eeds-text-on-brand:   #FFFFFF;\n  --eeds-border-default:  var(--eeds-ink-200);\n  --eeds-border-strong:   var(--eeds-ink-300);\n\n  /* -------- TYPOGRAPHY -------- */\n  --eeds-font-display: 'Sora', system-ui, -apple-system, sans-serif;\n  --eeds-font-body:    'Inter', system-ui, -apple-system, sans-serif;\n  --eeds-font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', monospace;\n\n  --eeds-fs-xs:   11px;\n  --eeds-fs-sm:   13px;\n  --eeds-fs-base: 14px;\n  --eeds-fs-md:   16px;\n  --eeds-fs-lg:   18px;\n  --eeds-fs-xl:   20px;\n  --eeds-fs-2xl:  24px;\n  --eeds-fs-3xl:  30px;\n  --eeds-fs-4xl:  36px;\n  --eeds-fs-5xl:  48px;\n\n  --eeds-fw-regular:  400;\n  --eeds-fw-medium:   500;\n  --eeds-fw-semibold: 600;\n  --eeds-fw-bold:     700;\n\n  --eeds-lh-tight:   1.2;\n  --eeds-lh-snug:    1.35;\n  --eeds-lh-normal:  1.5;\n  --eeds-lh-relaxed: 1.65;\n\n  /* -------- SPACING (4-multiple ramp) -------- */\n  --eeds-sp-0:  0;\n  --eeds-sp-1:  4px;\n  --eeds-sp-2:  8px;\n  --eeds-sp-3:  12px;\n  --eeds-sp-4:  16px;\n  --eeds-sp-5:  20px;\n  --eeds-sp-6:  24px;\n  --eeds-sp-8:  32px;\n  --eeds-sp-10: 40px;\n  --eeds-sp-12: 48px;\n  --eeds-sp-16: 64px;\n  --eeds-sp-20: 80px;\n  --eeds-sp-24: 96px;\n\n  /* -------- RADII -------- */\n  --eeds-r-none: 0;\n  --eeds-r-sm:   6px;\n  --eeds-r-md:   8px;\n  --eeds-r-lg:   12px;\n  --eeds-r-xl:   16px;\n  --eeds-r-2xl:  24px;\n  --eeds-r-full: 9999px;\n\n  /* -------- SHADOWS -------- */\n  --eeds-shadow-sm:         0 1px 2px 0 rgba(14,17,25,0.05);\n  --eeds-shadow-card:       0 1px 2px 0 rgba(14,17,25,0.04), 0 1px 3px 0 rgba(14,17,25,0.06);\n  --eeds-shadow-card-hover: 0 4px 12px -2px rgba(14,17,25,0.08), 0 2px 6px -1px rgba(14,17,25,0.06);\n  --eeds-shadow-pop:        0 12px 32px -8px rgba(14,17,25,0.16), 0 4px 12px -2px rgba(14,17,25,0.08);\n  --eeds-shadow-modal:      0 24px 48px -12px rgba(14,17,25,0.25);\n\n  /* -------- MOTION -------- */\n  --eeds-d-instant: 0ms;\n  --eeds-d-fast:    120ms;\n  --eeds-d-base:    200ms;\n  --eeds-d-slow:    320ms;\n  --eeds-d-slower:  480ms;\n  --eeds-ease-standard:   cubic-bezier(0.2, 0, 0, 1);\n  --eeds-ease-decelerate: cubic-bezier(0, 0, 0.2, 1);\n  --eeds-ease-accelerate: cubic-bezier(0.4, 0, 1, 1);\n}\n\n/* ============================================================\n   Semantic type roles — apply directly via class\n   ============================================================ */\n\nhtml, body {\n  font-family: var(--eeds-font-body);\n  font-size: var(--eeds-fs-base);\n  line-height: var(--eeds-lh-normal);\n  color: var(--eeds-text-primary);\n  background: var(--eeds-bg-base);\n  -webkit-font-smoothing: antialiased;\n  font-feature-settings: \"ss01\", \"cv11\";\n}\n\n.eeds-display { font-family: var(--eeds-font-display); letter-spacing: -0.02em; }\n.eeds-body    { font-family: var(--eeds-font-body); }\n.eeds-mono    { font-family: var(--eeds-font-mono); font-variant-numeric: tabular-nums; }\n.eeds-num     { font-variant-numeric: tabular-nums; }\n\n/* Hero / page title — used for the largest screen-introducing words */\n.eeds-h1 {\n  font-family: var(--eeds-font-display);\n  font-weight: var(--eeds-fw-bold);\n  font-size: var(--eeds-fs-4xl);\n  line-height: var(--eeds-lh-tight);\n  letter-spacing: -0.02em;\n  color: var(--eeds-ink-900);\n}\n\n/* Section heading — page sub-areas */\n.eeds-h2 {\n  font-family: var(--eeds-font-display);\n  font-weight: var(--eeds-fw-bold);\n  font-size: var(--eeds-fs-2xl);\n  line-height: var(--eeds-lh-snug);\n  color: var(--eeds-ink-800);\n}\n\n/* Card / module heading */\n.eeds-h3 {\n  font-family: var(--eeds-font-display);\n  font-weight: var(--eeds-fw-semibold);\n  font-size: var(--eeds-fs-md);\n  line-height: var(--eeds-lh-snug);\n  color: var(--eeds-ink-800);\n}\n\n/* Body copy */\n.eeds-p {\n  font-family: var(--eeds-font-body);\n  font-size: var(--eeds-fs-base);\n  line-height: var(--eeds-lh-normal);\n  color: var(--eeds-ink-700);\n}\n\n/* Secondary / helper text */\n.eeds-p-muted {\n  font-family: var(--eeds-font-body);\n  font-size: var(--eeds-fs-sm);\n  color: var(--eeds-ink-500);\n}\n\n/* Eyebrow / label cap */\n.eeds-eyebrow {\n  font-family: var(--eeds-font-body);\n  font-size: var(--eeds-fs-xs);\n  font-weight: var(--eeds-fw-medium);\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  color: var(--eeds-ink-500);\n}\n\n/* Monetary / numeric — REQUIRED for any currency or technical number */\n.eeds-money,\n.eeds-code {\n  font-family: var(--eeds-font-mono);\n  font-variant-numeric: tabular-nums;\n  color: var(--eeds-ink-800);\n}\n\n/* Focus ring (WCAG 2.1 AA) */\n*:focus-visible {\n  outline: 2px solid var(--eeds-navy-600);\n  outline-offset: 2px;\n  border-radius: 4px;\n}\n<\u002Fstyle>\n<script src=\"29cb3f6f-0f3e-4aa2-9819-d4e97d9c2b8c\"><\u002Fscript>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; background: var(--eeds-ink-50); }\n  @keyframes eeFade { from { transform: translateY(6px); } to { transform: translateY(0); } }\n  @keyframes eePulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }\n  .ee-fade { animation: eeFade var(--eeds-d-slow) var(--eeds-ease-standard); }\n  .ee-scroll::-webkit-scrollbar { width: 10px; height: 10px; }\n  .ee-scroll::-webkit-scrollbar-thumb { background: var(--eeds-ink-300); border-radius: 9999px; border: 3px solid var(--eeds-ink-50); }\n  .ee-range { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 9999px; background: var(--eeds-ink-200); outline: none; }\n  .ee-range::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--eeds-orange-400); cursor: pointer; box-shadow: 0 1px 3px rgba(14,17,25,.3); border: 2px solid #fff; }\n  .ee-range::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--eeds-orange-400); cursor: pointer; border: 2px solid #fff; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<sc-if value=\"{{ show.logi ems:center; gap:4px; font-size:11px; font-weight:500; padding:2px 8px; border-radius:9999px; background:{{ l.st.bg }}; color:{{ l.st.fg }}; border:1px solid {{ l.st.bd }}\">{{ l.status }}<\u002Fspan><\u002Fspan>\n              <span style=\"display:inline-flex; justify-content:center; color:var(--eeds-ink-400); font-size:16px\">{{ ico.ChevronRight }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ OPORTUNIDADES ============ -->\n      <sc-if value=\"{{ show.oportunidades }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"ee-fade\" style=\"padding:24px; width:100%\">\n        <div style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:20px; max-width:1400px; margin-left:auto; margin-right:auto\">\n          <div>\n            <h2 style=\"font-family:var(--eeds-font-display); font-size:24px; font-weight:700; color:var(--eeds-ink-800); margin:0; letter-spacing:-.02em\">Oportunidades<\u002Fh2>\n            <p style=\"font-size:14px; color:var(--eeds-ink-500); margin:4px 0 0\">Acompanhe o pipeline de contratos em desenvolvimento por estágio.<\u002Fp>\n          <\u002Fdiv>\n          <button onclick=\"{{ goCotacao }}\" style=\"display:inline-flex; align-items:center; gap:8px; height:40px; padding:0 16px; border:0; background:var(--eeds-orange-400); color:#fff; border-radius:8px; font-family:var(--eeds-font-body); font-size:14px; font-weight:500; cursor:pointer; box-shadow:var(--eeds-shadow-sm)\"><span style=\"font-size:16px; display:inline-flex\">{{ ico.Calculator }}<\u002Fspan> Gerar cotação<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"ee-scroll\" style=\"overflow-x:auto; padding-bottom:8px\">\n          <div style=\"display:flex; gap:16px; min-width:1100px; max-width:1400px; margin:0 auto\">\n            <sc-for list=\"{{ pipeline }}\" as=\"col\" hint-placeholder-count=\"4\">\n \">\n              <div style=\"width:48px; height:48px; border-radius:12px; background:rgba(249,115,22,.2); color:var(--eeds-orange-300); display:flex; align-items:center; justify-content:center; font-size:26px\">{{ tierIco }}<\u002Fdiv>\n              <div><p style=\"font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:rgba(255,255,255,.6); margin:0\">Seu nível atual<\u002Fp><p style=\"font-family:var(--eeds-font-display); font-size:24px; font-weight:700; margin:2px 0 0\">Parceiro {{ nivel }}<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; margin-bottom:8px\"><span style=\"font-size:12px; color:rgba(255,255,255,.7)\">Progresso para {{ proxNivel }}<\u002Fspan><span style=\"font-family:var(--eeds-font-mono); font-size:12px; font-weight:600; color:var(--eeds-orange-300)\">{{ nivelPct }}%<\u002Fspan><\u002Fdiv>\n            <div style=\"height:10px; background:rgba(255,255,255,.15); border-radius:9999px; overflow:hidden; margin-bottom:8px\"><div style=\"height:100%; width:{{ nivelPctW }}; background:linear-gradient(90deg, var(--eeds-orange-400), var(--eeds-orange-300)); border-radius:9999px\"><\u002Fdiv><\u002Fdiv>\n            <p style=\"font-size:12px; color:rgba(255,255,255,.6); margin:0\">Faltam 12 MW fechados nos próximos 12 meses para alcançar o próximo nível.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border:1px solid var(--eeds-ink-200); border-radius:16px; padding:24px; box-shadow:var(--eeds-shadow-card)\">\n            <h3 style=\"font-family:var(--eeds-font-display); font-size:16px; font-weight:600; color:var(--eeds-ink-800); margin:0 0 16px\">Seus benefícios atuais<\u002Fh3>\n            <div style=\"display:flex; flex-direction:column; gap:12px\">\n              <sc-for list=\"{{ beneficios }}\" as=\"b\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex; align-items:center; gap:12px\">\n                  <div style=\"width:32px; height:32px; border-radius:8px; flex-shrink:0; background:{{ b.iconBg }}; color:{{ b.iconFg }}; display:flex; align-items:center; justify-content:center; font-size:15px\">{{ b.icoEl }}<\u002Fdiv>\n                  <div style=\"min-width:0\"><p style=\"font-size:13px; font-weight:500; color:var(--eeds-ink-800); margin:0\">{{ b.nome }}<\u002Fp><p style=\"font-size:12px; color:var(--eeds-ink-500); margin:1px 0 0\">{{ b.valor }}<\u002Fp><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:16px\">\n          <sc-for list=\"{{ tierCards }}\" as=\"tc\" hint-placeholder-count=\"4\">\n            <div style=\"border-radius:14px; padding:20px; border:1px solid {{ tc.cardBd }}; background:{{ tc.cardBg }}; color:{{ tc.cardFg }}; box-shadow:var(--eeds-shadow-card)\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:14px\">\n                <div style=\"font-size:24px; display:inline-flex; color:{{ tc.cor }}\">{{ tc.icoEl }}<\u002Fdiv>\n                <sc-if value=\"{{ tc.atual }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; background:var(--eeds-orange-400); color:#fff; padding:3px 8px; border-radius:9999px\">Atual<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n              <p style=\"font-family:var(--eeds-font-display); font-size:18px; font-weight:700; margin:0 0 2px\">{{ tc.nome }}<\u002Fp>\n              <p style=\"font-family:var(--eeds-font-mono); font-size:11px; opacity:.7; margin:0 0 16px\">{{ tc.faixa }} fechados<\u002Fp>\n              <div style=\"display:flex; flex-direction:column; gap:10px\">\n                <div><p style=\"font-size:10px; text-transform:uppercase; letter-spacing:.06em; opacity:.6; margin:0\">Upfront<\u002Fp><p style=\"font-family:var(--eeds-font-mono); font-size:15px; font-weight:600; margin:2px 0 0\">{{ tc.upfront }}<\u002Fp><\u002Fdiv>\n                <div><p style=\"font-size:10px; text-transform:uppercase; letter-spacing:.06em; opacity:.6; margin:0\">Recorrência<\u002Fp><p style=\"font-family:var(--eeds-font-mono); font-size:15px; font-weight:600; margin:2px 0 0\">{{ tc.recorr }}<\u002Fp><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ ATENDIMENTO ============ -->\n      <sc-if value=\"{{ show.atendimento }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"ee-fade\" style=\"padding:24px; max-width:1400px; margin:0 auto; width:100%\">\n        <div style=\"margin-bottom:20px\">\n          <h2 style=\"font-family:var(--eeds-font-display); font-size:24px; font-weight:700; color:var(--eeds-ink-800); margin:0; letter-spacing:-.02em\">Atendimento<\u002Fh2>\n          <p style=\"font-size:14px; color:var(--eeds-ink-500); margin:4px 0 0\">Fale com o time de suporte ao parceiro e acompanhe seus chamados.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1.3fr 1fr; gap:20px; align-items:start\">\n          <!-- chat -->\n          <div style=\"background:#fff; border:1px solid var(--eeds-ink-200); border-radius:16px; box-shadow:var(--eeds-shadow-card); overflow:hidden; display:flex; flex-direction:column; height:560px\">\n            <div style=\"display:flex; align-items:center; gap:12px; padding:16px 20px; background:linear-gradient(135deg, var(--eeds-navy-700), var(--eeds-navy-800)); color:#fff\">\n              <div style=\"width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,.14); display:flex; align-items:center; justify-content:center; font-size:18px\">{{ ico.Headphones }}<\u002Fdiv>\n              <div style=\"flex:1\"><p style=\"font-size:14px; font-weight:600; margin:0\">Suporte ao parceiro<\u002Fp><p style=\"font-size:12px; color:rgba(255,255,255,.7); margin:2px 0 0; display:flex; align-items:center; gap:6px\"><span style=\"width:7px; height:7px; border-radius:50%; background:var(--eeds-success-fg); display:inline-block\"><\u002Fspan> Online · responde em até 5 min<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"ee-scroll\" style=\"flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; background:var(--eeds-ink-50)\">\n              <sc-for list=\"{{ chatMsgs }}\" as=\"m\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex; justify-content:{{ m.rowJustify }}\">\n                  <div style=\"max-width:76%\">\n                    <sc-if value=\"{{ m.nome }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--eeds-ink-500); font-weight:600; margin:0 0 4px 2px\">{{ m.nome }}<\u002Fp><\u002Fsc-if>\n                    <div style=\"background:{{ m.bubbleBg }}; color:{{ m.bubbleFg }}; border:1px solid {{ m.bubbleBd }}; border-radius:14px; padding:10px 14px; font-size:14px; line-height:1.5\">{{ m.txt }}<\u002Fdiv>\n                    <p style=\"font-family:var(--eeds-font-mono); font-size:10px; color:var(--eeds-ink-400); margin:4px 2px 0; text-align:{{ m.rowJustify }}\">{{ m.hora }}<\u002Fp>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"padding:14px 16px; border-top:1px solid var(--eeds-ink-100); display:flex; align-items:center; gap:10px\">\n              <button style=\"border:0; background:transparent; color:var(--eeds-ink-400); cursor:pointer; font-size:18px; display:inline-flex; padding:8px\">{{ ico.Paperclip }}<\u002Fbutton>\n              <input value=\"{{ chatDraft }}\" onchange=\"{{ setChatDraft }}\" oninput=\"{{ setChatDraft }}\" onkeydown=\"{{ chatKey }}\" placeholder=\"Escreva sua mensagem...\" style=\"flex:1; height:42px; padding:0 14px; border:1px solid var(--eeds-ink-200); border-radius:10px; font-family:var(--eeds-font-body); font-size:14px; color:var(--eeds-ink-800); outline:none; background:var(--eeds-ink-50)\" style-focus=\"background:#fff; border-color:var(--eeds-navy-600)\">\n              <button onclick=\"{{ sendChat }}\" style=\"width:42px; height:42px; flex-shrink:0; border:0; border-radius:10px; background:var(--eeds-orange-400); color:#fff; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; font-size:18px\">{{ ico.Send }}<\u002Fbutton>\n            <\u002Fdiv>\n            <p style=\"font-size:11px; color:var(--eeds-ink-400); text-align:center; padding:0 16px 12px; margin:0; display:flex; align-items:center; justify-content:center; gap:6px\"><span style=\"font-size:12px; display:inline-flex\">{{ ico.ShieldCheck }}<\u002Fspan> Suas mensagens são registradas e auditadas conforme LGPD<\u002Fp>\n          <\u002Fdiv>\n          <!-- casos -->\n          <div>\n            <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:12px\">\n              <h3 style=\"font-family:var(--eeds-font-display); font-size:16px; font-weight:600; color:var(--eeds-ink-800); margin:0\">Meus chamados<\u002Fh3>\n              <button style=\"display:inline-flex; align-items:center; gap:8px; height:38px; padding:0 14px; border:0; background:var(--eeds-orange-400); color:#fff; border-radius:8px; font-family:var(--eeds-font-body); font-size:13px; font-weight:500; cursor:pointer; box-shadow:var(--eeds-shadow-sm)\"><span style=\"font-size:15px; display:inline-flex\">{{ ico.Plus }}<\u002Fspan> Abrir novo chamado<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:10px\">\n              <sc-for list=\"{{ casosAbertos }}\" as=\"c\" hint-placeholder-count=\"3\">\n                <div style=\"background:#fff; border:1px solid var(--eeds-ink-200); border-radius:12px; padding:16px; box-shadow:var(--eeds-shadow-sm); cursor:pointer\">\n                  <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:8px\">\n                    <span style=\"font-family:var(--eeds-font-mono); font-size:11px; color:var(--eeds-ink-500)\">{{ c.id }}<\u002Fspan>\n                    <span style=\"display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:500; padding:2px 8px; border-radius:9999px; background:{{ c.st.bg }}; color:{{ c.st.fg }}; border:1px solid {{ c.st.bd }}\">{{ c.status }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <p style=\"font-size:14px; font-weight:500; color:var(--eeds-ink-800); margin:0 0 10px; line-height:1.4\">{{ c.assunto }}<\u002Fp>\n                  <div style=\"display:flex; align-items:center; justify-content:space-between\">\n                    <span style=\"font-family:var(--eeds-font-mono); font-size:11px; color:var(--eeds-ink-500)\">{{ c.criado }}<\u002Fspan>\n                    <span style=\"display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:500; padding:2px 8px; border-radius:9999px; background:{{ c.slaSt.bg }}; color:{{ c.slaSt.fg }}; border:1px solid {{ c.slaSt.bd }}\">{{ c.sla }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ NOTIFICAÇÕES ============ -->\n      <sc-if value=\"{{ show.notificacoes }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"ee-fade\" style=\"padding:24px; max-width:840px; margin:0 auto; width:100%\">\n        <div style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px\">\n          <div>\n            <h2 style=\"font-family:var(--eeds-font-display); font-size:24px; font-weight:700; color:var(--eeds-ink-800); margin:0; letter-spacing:-.02em\">Notificações<\u002Fh2>\n            <p style=\"font-size:14px; color:var(--eeds-ink-500); margin:4px 0 0\">Você tem {{ notifUnread }} notificações não lidas.<\u002Fp>\n          <\u002Fdiv>\n          <button onclick=\"{{ markAllRead }}\" style=\"display:inline-flex; align-items:center; gap:8px; height:38px; padding:0 14px; border:1px solid var(--eeds-ink-300); background:#fff; color:var(--eeds-ink-700); border-radius:8px; font-family:var(--eeds-font-body); font-size:13px; font-weight:500; cursor:pointer\"><span style=\"font-size:15px; display:inline-flex\">{{ ico.CheckCheck }}<\u002Fspan> Marcar todas como lidas<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-for list=\"{{ notifGroups }}\" as=\"g\" hint-placeholder-count=\"2\">\n          <p style=\"font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--eeds-ink-500); font-weight:600; margin:18px 0 10px\">{{ g.quando }}<\u002Fp>\n          <div style=\"background:#fff; border:1px solid var(--eeds-ink-200); border-radius:12px; box-shadow:var(--eeds-shadow-card); overflow:hidden\">\n            <sc-for list=\"{{ g.items }}\" as=\"n\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex; align-items:flex-start; gap:14px; padding:16px 18px; border-bottom:1px solid var(--eeds-ink-100); position:relative\">\n                <div style=\"width:40px; height:40px; border-radius:10px; flex-shrink:0; background:{{ n.iconBg }}; color:{{ n.iconFg }}; display:flex; align-items:center; justify-content:center; font-size:18px\">{{ n.icoEl }}<\u002Fdiv>\n                <div style=\"flex:1; min-width:0\">\n                  <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:2px\">\n                    <span style=\"font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--eeds-ink-500); font-weight:600\">{{ n.tipo }}<\u002Fspan>\n                    <sc-if value=\"{{ n.dot }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:7px;         <div><p style=\"font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--eeds-ink-600); font-weight:500; margin:0 0 6px\">Telefone<\u002Fp><input placeholder=\"(00) 00000-0000\" style=\"width:100%; height:42px; padding:0 12px; border:1px solid var(--eeds-ink-200); border-radius:8px; font-family:var(--eeds-font-mono); font-size:14px; color:var(--eeds-ink-800); outline:none\" style-focus=\"border-color:var(--eeds-navy-600)\"><\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--eeds-ink-600); font-weight:500; margin:18px 0 10px\">Perfil de acesso<\u002Fp>\n            <div style=\"display:flex; flex-direction:column; gap:10px\">\n              <sc-for list=\"{{ perfis }}\" as=\"p\" hint-placeholder-count=\"3\">\n                <div onclick=\"{{ p.pick }}\" style=\"display:flex; gap:14px; padding:16px; border:1px solid {{ p.cardBd }}; box-shadow:{{ p.ring }}; background:{{ p.cardBg }}; border-radius:12px; cursor:pointer; transition:background var(--eeds-d-base) var(--eeds-ease-standard), border-color var(--eeds-d-base) var(--eeds-ease-standard)\">\n                  <div style=\"width:40px; height:40px; border-radius:10px; flex-shrink:0; background:{{ p.iconBg }}; color:{{ p.iconFg }}; display:flex; align-items:center; justify-content:center; font-size:18px\">{{ p.icoEl }}<\u002Fdiv>\n                  <div style=\"flex:1; min-width:0\">\n                    <div style=\"display:flex; align-items:center; justify-content:space-between; gap:8px\">\n                      <p style=\"font-size:14px; font-weight:600; color:var(--eeds-ink-800); margin:0\">{{ p.nome }}<\u002Fp>\n                      <span style=\"width:18px; height:18px; border-radius:50%; flex-shrink:0; border:2px solid {{ p.radioBd }}; display:inline-flex; align-items:center; justify-content:center\">\n                        <sc-if value=\"{{ p.radioOn }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:9px; height:9px; border-radius:50%; background:var(--eeds-navy-600)\"><\u002Fspan><\u002Fsc-if>\n                      <\u002Fspan>\n                    <\u002Fdiv>\n                    <p style=\"font-size:12px; color:var(--eeds-ink-500); margin:2px 0 10px\">{{ p.resumo }}<\u002Fp>\n                    <div style=\"display:flex; flex-direction:column; gap:5px\">\n                      <sc-for list=\"{{ p.bullets }}\" as=\"b\" hint-placeholder-count=\"3\">\n                        <div style=\"display:flex; align-items:flex-start; gap:8px\"><span style=\"font-size:14px; display:inline-flex; color:var(--eeds-success-fg); flex-shrink:0; margin-top:1px\">{{ checkIco }}<\u002Fspan><span style=\"font-size:13px; color:var(--eeds-ink-700); line-height:1.45\">{{ b }}<\u002Fspan><\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <p style=\"font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--eeds-ink-600); font-weight:600; margin:20px 0 10px\">Configuração de notificações<\u002Fp>\n            <p style=\"font-size:12px; color:var(--eeds-ink-500); margin:0 0 12px\">Escolha sobre o que este agente será avisado por e-mail e no portal.<\u002Fp>\n            <div style=\"border:1px solid var(--eeds-ink-200); border-radius:12px; overflow:hidden\">\n              <sc-for list=\"{{ notifPrefs }}\" as=\"n\" hint-placeholder-count=\"4\">\n                <div onclick=\"{{ n.toggle }}\" style=\"display:flex; align-items:center; gap:12px; padding:12px 14px; border-bottom:1px solid var(--eeds-ink-100); cursor:pointer\">\n                  <div style=\"width:34px; height:34px; border-radius:8px; flex-shrink:0; background:{{ n.iconBg }}; color:{{ n.iconFg }}; display:flex; align-items:center; justify-content:center; font-size:16px\">{{ n.icoEl }}<\u002Fdiv>\n                  <div style=\"flex:1; min-width:0\"><p style=\"font-size:13px; font-weight:500; color:var(--eeds-ink-800); margin:0\">{{ n.label }}<\u002Fp><p style=\"font-size:12px; color:var(--eeds-ink-500); margin:1px 0 0\">{{ n.desc }}<\u002Fp><\u002Fdiv>\n                  <div style=\"width:38px; height:22px; border-radius:9999px; flex-shrink:0; padding:2px; background:{{ n.trackBg }}; transition:background var(--eeds-d-base) var(--eeds-ease-standard); display:flex; justify-content:{{ n.knobJustify }}\">\n                    <div style=\"width:18px; height:18px; border-radius:50%; background:#fff; box-shadow:var(--eeds-shadow-sm)\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; justify-content:flex-end; gap:8px; padding:0 24px 24px\">\n            <button onclick=\"{{ closeInvite }}\" style=\"height:42px; padding:0 18px; border:1px solid var(--eeds-ink-300); background:#fff; color:var(--eeds-ink-700); border-radius:10px; font-family:var(--eeds-font-body); font-size:14px; font-weight:500; cursor:pointer\">Cancelar<\u002Fbutton>\n            <button onclick=\"{{ closeInvite }}\" style=\"display:inline-flex; align-items:center; gap:8px; height:42px; padding:0 18px; border:0; background:var(--eeds-orange-400); color:#fff; border-radius:10px; font-family:var(--eeds-font-body); font-size:14px; font-weight:600; cursor:pointer; box-shadow:var(--eeds-shadow-sm)\"><span style=\"font-size:16px; display:inline-flex\">{{ ico.Send }}<\u002Fspan> Enviar convite<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;nivelParceiro&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Bronze&quot;,&quot;Prata&quot;,&quot;Ouro&quot;,&quot;Diamante&quot;],&quot;default&quot;:&quot;Bronze&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;dashboardVariant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Resumo executivo&quot;,&quot;Foco em comissões&quot;],&quot;default&quot;:&quot;Foco em comissões&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'dashboard',\n    loggedIn: false,\n    loginStep: 'email',\n    qVolume: 2.5,\n    qPrazo: 36,\n    qPreco: 285,\n    qUpfront: null,\n    qRecorr: null,\n    quoteVariant: 'guiado',\n    pipelineView: 'kanban',\n    drawer: null,\n    payTab: 'upfront',\n    video: null,\n    tierView: 'jornada',\n    contaTab: 'usuario',\n    userMenuOpen: false,\n    inviteOpen: false,\n    invitePerfil: 'agente',\n    invNotif: { comissao:true, oportunidade:true, suporte:true, novidades:false },\n    contaNotif: { comissaoEmail:true, comissaoPortal:true, oportEmail:true, oportPortal:true, propostaEmail:true, propostaPortal:true, suporteEmail:false, suportePortal:true, novidadesEmail:false, novidadesPortal:false },\n    chatDraft: '',\n    chatMsgs: [\n      { from:'agent', nome:'Echo · Suporte ao parceiro', txt:'Olá, Renata. Sou a Lúcia, do time de suporte ao parceiro. Como posso ajudar hoje?', hora:'09:12' },\n      { from:'me', txt:'Bom dia! A comissão recorrente da Cooperativa Agro Sul de maio ainda aparece como \"em análise\". Consegue verificar?', hora:'09:14' },\n      { from:'agent', nome:'Echo · Suporte ao parceiro', txt:'Claro. O repasse de maio foi conciliado com a CCEE e já está aprovado — cai na sua conta dia 30/06 junto com a competência de junho.', hora:'09:16' },\n      { from:'me', txt:'Perfeito, obrigada!', hora:'09:16' },\n    ],\n  };\n\n  componentDidMount() {\n    if (window.lucide) { try { window.lucide.createIcons(); } catch(e){} }\n    this._iv = setInterval(() => {\n      if (window.lucide && window.lucide.icons) { clearInterval(this._iv); this.forceUpdate(); }\n    }, 100);\n  }\n  componentWillUnmount() { clearInterval(this._iv); }\n\n  fmt(n, d) { d = d || 0; return Number(n).toLocaleString('pt-BR', { style:'currency', currency:'BRL', minimumFractionDigits:d, maximumFractionDigits:d }); }\n  num(n, d) { d = d || 0; return Number(n).toLocaleString('pt-BR', { minimumFractionDigits:d, maximumFractionDigits:d }); }\n\n  tiers() {\n    return {\n      Bronze:   { nome:'Bronze',   upfront:1.0, recorr:1.0, cor:'#9098AB', precoBase:false, atualMW:0,  proxMW:5,  prox:'Prata' },\n      Prata:    { nome:'Prata',    upfront:1.5, recorr:1.5, cor:'#646E85', precoBase:false, atualMW:5,  proxMW:15, prox:'Ouro' },\n      Ouro:     { nome:'Ouro',     upfront:2.0, recorr:2.0, cor:'#F97316', precoBase:true,  atualMW:15, proxMW:40, prox:'Diamante' },\n      Diamante: { nome:'Diamante', upfront:2.5, recorr:3.0, cor:'#1E2C7A', precoBase:true,  atualMW:40, proxMW:null, prox:null },\n    };\n  }\n\n  icoNames() {\n    return ['LayoutDashboard','Users','Workflow','Calculator','Handshake','Wallet','GraduationCap','Award','Search','Bell','ChevronDown','ChevronRight','ChevronLeft','ChevronUp','Plus','ArrowRight','ArrowLeft','Download','Send','X','Check','CircleCheck','Clock','TrendingUp','TrendingDown','Zap','MapPin','Phone','Mail','Building2','Play','Lock','Star','FileText','Repeat','Filter','LogOut','Sparkles','Target','Percent','Calendar','FileDown','Eye','PlayCircle','CircleDollarSign','BadgeCheck','Briefcase','UserPlus','PhoneCall','SlidersHorizontal','ArrowUpRight','Crown','Gem','Medal','ShieldCheck','Info','ExternalLink','MoreHorizontal','Pencil','FileSignature','Receipt','HandCoins','Lightbulb','Quote','CheckCheck','Headphones','Paperclip','CreditCard','Banknote','AtSign','Smartphone','Save','MessageSquare','BellRing','Trash2','Settings','ShieldCheck','MapPin','User','Globe'];\n  }\n  buildIco() {\n    const out = {};\n    const L = window.lucide;\n    this.icoNames().forEach(n => {\n      const data = L && L.icons && L.icons[n];\n      if (data) {\n        const kids = data.map((node, i) => React.createElement(node[0], Object.assign({ key: i }, node[1])));\n        out[n] = React.createElement('svg', { width:'1em', height:'1em', viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:1.75, strokeLinecap:'round', strokeLinejoin:'round', style:{ display:'block' } }, kids);\n      } else { out[n] = null; }\n    });\n    return out;\n  }\n\n  nav(ico) {\n    const s = this.state.screen;\n    const items = [\n      { id:'dashboard',    label:'Visão geral',    icon:'LayoutDashboard' },\n      { id:'leads',        label:'Leads',          icon:'Users', badge:'3' },\n      { id:'oportunidades',label:'Oportunidades',  icon:'Workflow' },\n      { id:'cotacao',      label:'Cotações',       icon:'Calculator' },\n      { id:'negociacoes',  label:'Negociações',    icon:'Handshake' },\n      { id:'pagamentos',   label:'Pagamentos',     icon:'Wallet' },\n      { id:'treinamentos', label:'Treinamentos',   icon:'GraduationCap' },\n      { id:'nivel',        label:'Nível de parceiro', icon:'Award' },\n      { id:'__sep',        label:'Conta & suporte', sep:true },\n      { id:'atendimento',  label:'Atendimento',    icon:'Headphones', badge:'1' },\n      { id:'notificacoes', label:'Notificações',   icon:'Bell' },\n      { id:'conta',        label:'Conta',          icon:'Building2' },\n    ];\n    return items.map(it => {\n      if (it.sep) return { sep:true, label: it.label };\n      const active = s === it.id;\n      return {\n        sep: false,\n        label: it.label,\n        icoEl: ico[it.icon],\n        active: active,\n        isButton: true,\n        badge: it.badge || null,\n        bg: active ? 'var(--eeds-navy-50)' : 'transparent',\n        fg: active ? 'var(--eeds-navy-700)' : 'var(--eeds-ink-600)',\n        onClick: () => this.setState({ screen: it.id }),\n      };\n    });\n  }\n\n  computeQuote(nivel) {\n    const t = this.tiers()[nivel] \n\n    // dashboard KPIs\n    const kpis = [\n      { label:'Comissão do mês', value:fmt(48720), unit:'', change:'+12%', trend:'up', icon:'CircleDollarSign', accent:'navy' },\n      { label:'Recorrência ativa', value:fmt(21340), unit:'/mês', change:'+4%', trend:'up', icon:'Repeat', accent:'orange' },\n      { label:'Pipeline ativo', value:'R$ 11,2', unit:'mi', change:'+2', trend:'up', icon:'Workflow', accent:'info' },\n      { label:'Contratos fechados', value:'14', unit:'no ano', change:'+3', trend:'up', icon:'Handshake', accent:'success' },\n    ];\n    const accentMap = {\n      navy:{bg:'var(--eeds-navy-50)',fg:'var(--eeds-navy-600)'},\n      orange:{bg:'var(--eeds-orange-50)',fg:'var(--eeds-orange-500)'},\n      info:{bg:'var(--eeds-info-bg)',fg:'var(--eeds-info-fg)'},\n      success:{bg:'var(--eeds-success-bg)',fg:'var(--eeds-success-fg)'},\n    };\n    const kpiVals = kpis.map(k => ({\n      label:k.label, value:k.value, unit:k.unit, change:k.change,\n      icoEl: ico[k.icon],\n      accentBg: accentMap[k.accent].bg, accentFg: accentMap[k.accent].fg,\n      trendBg: k.trend==='up'?'var(--eeds-success-bg)':'var(--eeds-danger-bg)',\n      trendFg: k.trend==='up'?'var(--eeds-success-fg)':'var(--eeds-danger-fg)',\n      trendIco: k.trend==='up'?ico.TrendingUp:ico.TrendingDown,\n    }));\n\n    const chartRaw = [\n      {label:'Nov', up:18, rec:9}, {label:'Dez', up:26, rec:11}, {label:'Jan', up:14, rec:13}, {label:'Fev', up:31, rec:15},\n      {label:'Mar', up:22, rec:16}, {label:'Abr', up:38, rec:18}, {label:'Mai', up:29, rec:20}, {label:'Jun', up:27, rec:21},\n    ];\n    const maxBar = 60;\n    const chartBars = chartRaw.map(b => ({ label:b.label, upH:(b.up/maxBar*170)+'px', recH:(b.rec/maxBar*170)+'px' }));\n\n    const funil = [\n      { stage:'Qualificação', qtd:'6', valor:fmt(3800000), w:'85%', cor:'var(--eeds-ink-400)' },\n      { stage:'Proposta enviada', qtd:'4', valor:fmt(4200000), w:'62%', cor:'var(--eeds-info-fg)' },\n      { stage:'Negociação', qtd:
